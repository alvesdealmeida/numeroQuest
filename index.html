<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NúmeroQuest — Reta & Sequência Numérica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Base ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #080f1e;
  --bg2:        #0d1b30;
  --card:       rgba(255,255,255,0.04);
  --border:     rgba(255,255,255,0.10);
  --accent:     #7c6fef;
  --accent2:    #ffd93d;
  --accent3:    #55efc4;
  --danger:     #ff6b6b;
  --text:       #e8f0fe;
  --muted:      #7a94b0;
  --radius:     20px;
  --shadow:     0 8px 40px rgba(0,0,0,0.5);
}

html, body {
  height: 100%;
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

/* ─── Restrição Desktop ───────────────────────────────────── */
#mobile-only-overlay {
  position: fixed; inset: 0; background: var(--bg); z-index: 10000;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  padding: 30px; text-align: center;
}
@media (min-width: 1025px) {
  #mobile-only-overlay { display: flex; }
  .app-shell { display: none; }
}

/* ─── Background ─────────────────────────────────────────── */
.bg-canvas {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,111,239,0.15) 0%, transparent 70%), var(--bg);
  pointer-events: none;
}
.stars-layer { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle 3s infinite alternate; }
@keyframes twinkle { from { opacity: 0.2; } to { opacity: 0.8; } }

/* ─── Layout ──────────────────────────────────────────────── */
.app-shell { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }
.screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
.screen.active { display: flex; }

/* ─── Home ─── */
.home-logo { font-family: 'Fredoka One', cursive; font-size: clamp(2.5rem, 8vw, 5rem); background: linear-gradient(135deg, #ffd93d, #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
.home-config { width: 100%; max-width: 500px; background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 25px; backdrop-filter: blur(10px); }
.pill-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
.pill { flex: 1; min-width: 80px; padding: 10px; border-radius: 12px; border: 2px solid var(--border); background: rgba(255,255,255,0.05); color: var(--muted); cursor: pointer; font-weight: bold; font-size: 0.85rem; }
.pill.active { border-color: var(--accent); color: white; background: rgba(124,111,239,0.2); }

/* ─── Game ─── */
.topbar { width: 100%; max-width: 600px; display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: 800; }
.game-card { width: 100%; max-width: 600px; background: var(--card); border: 1.5px solid var(--border); border-radius: 28px; padding: 25px; text-align: center; }
.seq-display { display: flex; justify-content: center; gap: 12px; margin: 20px 0; flex-wrap: wrap; align-items: center; }
.seq-box { width: 65px; height: 65px; background: rgba(124,111,239,0.1); border: 2px solid var(--accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: 'Fredoka One'; font-size: 1.6rem; }
.seq-box.blank { background: rgba(255,217,61,0.1); border-color: var(--accent2); color: var(--accent2); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
.opt-btn { padding: 18px; border-radius: 15px; border: 2px solid var(--border); background: rgba(255,255,255,0.05); color: white; font-family: 'Fredoka One'; font-size: 1.6rem; cursor: pointer; transition: 0.2s; }
.opt-btn.correct { background: rgba(85,239,196,0.3) !important; border-color: var(--accent3) !important; transform: scale(1.05); }
.opt-btn.wrong { background: rgba(255,107,107,0.3) !important; border-color: var(--danger) !important; animation: shake 0.3s; }

@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

.btn-next { width: 100%; margin-top: 20px; padding: 15px; border-radius: 50px; background: var(--accent); border: none; color: white; font-family: 'Fredoka One'; font-size: 1.2rem; cursor: pointer; display: none; }
.btn-start { padding: 18px 50px; border-radius: 50px; background: var(--accent); border: none; color: white; font-family: 'Fredoka One'; font-size: 1.5rem; cursor: pointer; }

/* Confetes */
.confetti { position: fixed; width: 10px; height: 10px; z-index: 9999; animation: fall 3s linear forwards; }
@keyframes fall { to { transform: translateY(100vh) rotate(360deg); opacity: 0; } }
</style>
</head>
<body>

<div id="mobile-only-overlay">
  <h1 style="font-family: 'Fredoka One'; color: var(--accent2);">📱 Use o Celular</h1>
  <p style="color: var(--muted); margin-top: 10px;">Este jogo foi feito para telas de celular ou tablet.</p>
</div>

<div class="bg-canvas"></div>
<div class="stars-layer" id="stars"></div>

<div class="app-shell">
  <!-- HOME -->
  <section class="screen active" id="screen-home">
    <div class="home-logo">🔢 NúmeroQuest</div>
    <div class="home-config">
      <p style="margin-bottom:10px; font-weight:bold; color:var(--muted)">MODO DE JOGO</p>
      <div class="pill-group" id="mode-pills">
        <button class="pill active" data-mode="line">Reta</button>
        <button class="pill" data-mode="seq">Sequência</button>
        <button class="pill" data-mode="neighbor">Vizinhos</button>
        <button class="pill" data-mode="mixed">Misto</button>
      </div>
      <p style="margin-bottom:10px; font-weight:bold; color:var(--muted)">DIFICULDADE</p>
      <div class="pill-group" id="diff-pills">
        <button class="pill active" data-diff="1">Fácil (0-20)</button>
        <button class="pill" data-diff="2">Médio (0-50)</button>
        <button class="pill" data-diff="3">Difícil (0-100)</button>
      </div>
    </div>
    <button class="btn-start" onclick="startGame()">▶ JOGAR</button>
  </section>

  <!-- GAME -->
  <section class="screen" id="screen-game">
    <div class="topbar">
      <span>⭐ <span id="g-score">0</span></span>
      <span>🔥 <span id="g-streak">0</span></span>
      <span id="g-lives">❤️❤️❤️</span>
    </div>
    <div class="game-card">
      <h2 id="g-question" style="margin-bottom:15px; color: var(--accent2);"></h2>
      <div id="g-game-area"></div>
      <div class="options-grid" id="g-options"></div>
      <button class="btn-next" id="g-next-btn" onclick="nextQuestion()">PRÓXIMA PERGUNTA →</button>
    </div>
  </section>

  <!-- RESULT -->
  <section class="screen" id="screen-result">
    <h1 style="font-family:'Fredoka One'; font-size: 3rem; color: var(--accent2);">VITÓRIA!</h1>
    <p id="r-final-score" style="font-size: 1.5rem; margin: 20px 0;"></p>
    <button class="btn-start" onclick="location.reload()">JOGAR NOVAMENTE</button>
  </section>
</div>

<script>
/* ─── Audio ─── */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSfx(freqs) {
  const now = audioCtx.currentTime;
  freqs.forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(f, now + i * 0.1);
    g.gain.setValueAtTime(0.1, now + i * 0.1);
    g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.3);
    osc.start(now + i * 0.1); osc.stop(now + i * 0.1 + 0.3);
  });
}

function spawnConfetti() {
  for(let i=0; i<50; i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100+'vw';
    c.style.background = `hsl(${Math.random()*360}, 80%, 60%)`;
    c.style.animationDuration = (Math.random()*2 + 1) + 's';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3000);
  }
}

/* ─── Lógica do Jogo ─── */
let cfg = { mode:'line', diff:1, totalQ:10 };
let gs = { score:0, streak:0, lives:3, qNum:0, answered:false };

document.querySelectorAll('.pill').forEach(p => {
  p.onclick = () => {
    p.parentElement.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    if(p.dataset.mode) cfg.mode = p.dataset.mode;
    if(p.dataset.diff) cfg.diff = +p.dataset.diff;
  };
});

function startGame(){
  gs = { score:0, streak:0, lives:3, qNum:0, answered:false };
  document.getElementById('screen-home').classList.remove('active');
  document.getElementById('screen-game').classList.add('active');
  nextQuestion();
}

function makeQ() {
  let mode = cfg.mode;
  if (mode === 'mixed') {
    const modes = ['line', 'seq', 'neighbor'];
    mode = modes[Math.floor(Math.random() * modes.length)];
  }

  const range = cfg.diff === 1 ? 20 : (cfg.diff === 2 ? 50 : 100);
  const step = cfg.diff === 1 ? 1 : (cfg.diff === 2 ? [1,2,5][Math.floor(Math.random()*3)] : [2,5,10][Math.floor(Math.random()*3)]);
  
  let start = Math.floor(Math.random() * (range - 10)) + 1;
  let fullSeq = Array.from({length:6}, (_, i) => start + i * step);
  let hideIdx = Math.floor(Math.random() * 4) + 1;
  let ans, opts, questionText;

  if (mode === 'neighbor') {
    const baseNum = Math.floor(Math.random() * (range - 2)) + 1;
    const isSuccessor = Math.random() > 0.5;
    if (isSuccessor) {
      ans = baseNum + 1;
      questionText = `Quem é o SUCESSOR de ${baseNum}?`;
      fullSeq = [baseNum, '❓'];
    } else {
      ans = baseNum - 1;
      questionText = `Quem é o ANTECESSOR de ${baseNum}?`;
      fullSeq = ['❓', baseNum];
    }
    hideIdx = fullSeq.indexOf('❓');
  } else {
    ans = fullSeq[hideIdx];
    questionText = mode === 'line' ? "Complete a Reta Numérica:" : "Qual número falta na sequência?";
  }

  // Gerar opções erradas únicas
  let wrong = new Set();
  while(wrong.size < 3) {
    let w = ans + (Math.floor(Math.random() * 7) - 3);
    if (w !== ans && w >= 0) wrong.add(w);
  }
  opts = [ans, ...wrong].sort(() => Math.random() - 0.5);

  return { type: mode, seq: fullSeq, ans, opts, hideIdx, questionText };
}

function nextQuestion() {
  if(gs.lives <= 0 || gs.qNum >= cfg.totalQ) return showResult();
  gs.qNum++;
  gs.answered = false;
  const q = makeQ();
  gs.currentQ = q;

  document.getElementById('g-score').textContent = gs.score;
  document.getElementById('g-streak').textContent = gs.streak;
  document.getElementById('g-lives').textContent = '❤️'.repeat(gs.lives);
  document.getElementById('g-next-btn').style.display = 'none';
  document.getElementById('g-question').textContent = q.questionText;

  const area = document.getElementById('g-game-area');
  area.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'seq-display';
  
  q.seq.forEach((n, i) => {
    const b = document.createElement('div');
    b.className = (n === '❓' || i === q.hideIdx) ? 'seq-box blank' : 'seq-box';
    b.textContent = (n === '❓' || i === q.hideIdx) ? '?' : n;
    wrap.appendChild(b);
    if(q.type === 'line' && i < q.seq.length - 1) {
        const line = document.createElement('span');
        line.innerHTML = '—';
        line.style.color = 'var(--border)';
        wrap.appendChild(line);
    }
  });
  area.appendChild(wrap);

  const optsArea = document.getElementById('g-options');
  optsArea.innerHTML = '';
  q.opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = o;
    btn.onclick = () => check(o, btn);
    optsArea.appendChild(btn);
  });
}

function check(val, btn) {
  if(gs.answered) return;
  gs.answered = true;
  const isCorrect = val === gs.currentQ.ans;

  if(isCorrect) {
    playSfx([523, 659, 783]); 
    btn.classList.add('correct');
    gs.score += 10 + (gs.streak * 2);
    gs.streak++;
  } else {
    playSfx([220, 180]); 
    btn.classList.add('wrong');
    gs.lives--;
    gs.streak = 0;
    // Mostrar a correta
    Array.from(document.querySelectorAll('.opt-btn')).forEach(b => {
        if(parseInt(b.textContent) === gs.currentQ.ans) b.classList.add('correct');
    });
  }
  
  document.getElementById('g-next-btn').style.display = 'block';
}

function showResult() {
  document.getElementById('screen-game').classList.remove('active');
  document.getElementById('screen-result').classList.add('active');
  document.getElementById('r-final-score').textContent = `Pontuação Final: ${gs.score}`;
  if(gs.score >= (cfg.totalQ * 5)) {
    playSfx([523, 659, 783, 1046]);
    spawnConfetti();
  }
}

// Estrelas de fundo
for(let i=0; i<35; i++){
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random()*100+'%';
  s.style.top = Math.random()*100+'%';
  const size = Math.random()*3+'px';
  s.style.width = size; s.style.height = size;
  document.getElementById('stars').appendChild(s);
}
</script>
</body>
</html>
